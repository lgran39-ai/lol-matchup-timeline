*{box-sizing:border-box;margin:0;padding:0}body{background:#0f172a;color:#f1f5f9;font-family:'Noto Sans JP','Chakra Petch',sans-serif;min-height:100vh}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.cp{font-family:'Chakra Petch',sans-serif}.header{padding:26px 18px 18px;text-align:center;background:linear-gradient(180deg,rgba(99,102,241,0.08),transparent);border-bottom:1px solid rgba(148,163,184,0.06)}.header h1{font-family:'Chakra Petch',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline}.hrow{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:5px}.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:17px}.sub{color:#64748b;font-size:12px}.box{max-width:700px;margin:0 auto;padding:16px 14px 50px}.tabs{display:flex;gap:4px;padding:4px;background:rgba(15,23,42,0.6);border-radius:12px;border:1px solid rgba(148,163,184,0.1)}.tab{flex:1;padding:10px 4px;background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;color:#64748b}.tab.on{background:var(--tbg);border-color:var(--tbc)}.srow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-top:12px}.sw{position:relative;flex:1;min-width:150px}.slbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#64748b;margin-bottom:5px;font-family:'Chakra Petch',sans-serif}.sbtn{width:100%;padding:10px 12px;background:rgba(30,41,59,0.6);border:1px solid rgba(148,163,184,0.2);border-radius:10px;color:#f1f5f9;font-size:14px;font-weight:600;font-family:'Chakra Petch',sans-serif;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;outline:none}.sbtn.emp{color:#64748b}.vs{font-size:18px;font-weight:700;color:#334155;font-family:'Chakra Petch',sans-serif;padding-bottom:10px;flex-shrink:0}.dd{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#1e293b;border:1px solid rgba(148,163,184,0.2);border-radius:10px;z-index:100;max-height:280px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.5)}.dd input{padding:8px 12px;background:transparent;border:none;border-bottom:1px solid rgba(148,163,184,0.15);color:#f1f5f9;font-size:13px;outline:none}.ddl{overflow-y:auto;flex:1}.ddi{display:flex;align-items:center;gap:8px;width:100%;padding:6px 12px;background:transparent;border:none;color:#e2e8f0;font-size:12px;font-family:'Chakra Petch',sans-serif;cursor:pointer;text-align:left}.ddi:hover{background:rgba(148,163,184,0.1)}.ci{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.12);flex-shrink:0}.prow{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}.pbtn{padding:3px 9px;background:rgba(30,41,59,0.5);border:1px solid rgba(148,163,184,0.1);border-radius:14px;color:#94a3b8;font-size:10px;font-family:'Chakra Petch',sans-serif;cursor:pointer;white-space:nowrap}.pbtn.on{background:rgba(99,102,241,0.2);border-color:rgba(99,102,241,0.4)}.mh{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px;background:rgba(30,41,59,0.4);border-radius:12px;border:1px solid rgba(148,163,184,0.1)}.mn{margin-top:4px;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;text-align:center}.sr{margin-top:10px;display:flex;justify-content:center;gap:14px}.sb{text-align:center;padding:7px 14px;background:rgba(30,41,59,0.3);border-radius:8px}.warn{margin-top:10px;padding:7px 12px;background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.2);border-radius:8px;font-size:11px;color:#eab308}.tbl{display:flex;justify-content:space-between;margin-bottom:6px;font-family:'Chakra Petch',sans-serif;font-size:11px;color:#94a3b8}.tb{display:flex;gap:3px;height:50px;align-items:center}.tbs{flex:1;height:50px;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}.tbs:hover{height:58px;transform:translateY(-3px)}.td{margin-top:10px;padding:12px 14px;background:rgba(30,41,59,0.85);border-radius:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.tdc{background:rgba(30,41,59,0.5);border-radius:6px;padding:6px 8px;text-align:center}.ac{margin-bottom:6px;background:rgba(30,41,59,0.3);border-radius:8px;overflow:hidden}.acs{display:flex;align-items:center;gap:10px;padding:8px 12px}.atx{padding:6px 12px 10px;border-top:1px solid rgba(148,163,184,0.06);font-size:11px;line-height:1.7;color:#94a3b8}.aip{margin-top:16px;padding:14px 18px;background:linear-gradient(135deg,rgba(99,102,241,0.07),rgba(168,85,247,0.07));border-radius:12px;border:1px solid rgba(139,92,246,0.2)}.aib{padding:5px 12px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:600;font-family:'Chakra Petch',sans-serif;cursor:pointer}.ft{margin-top:20px;padding:10px 14px;background:rgba(30,41,59,0.2);border-radius:8px;font-size:10px;color:#475569;line-height:1.6}

<div class="header"><div class="hrow"><div class="logo">⚔</div><h1>LoL Matchup Timeline</h1></div><p class="sub" id="sub">読み込み中...</p></div>
<div class="box"><div class="tabs" id="tabs"></div><div id="selArea"><div class="srow"><div class="sw" id="swA"></div><div class="vs">VS</div><div class="sw" id="swB"></div></div></div><div style="margin-top:12px"><span class="cp" style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#475569">データあり</span><div class="prow" id="presets"></div></div><div id="out"></div></div>
<script>
const ROLES={top:{l:"TOP",i:"⬆",c:"#e67e22"},jg:{l:"JG",i:"🌿",c:"#27ae60"},mid:{l:"MID",i:"⬛",c:"#3498db"},bot:{l:"BOT",i:"👥",c:"#f59e0b"},adc:{l:"ADC",i:"🏹",c:"#e74c3c"},sup:{l:"SUP",i:"🛡",c:"#9b59b6"}};const LF={"0-5min":"Lv1-3","5-10min":"Lv4-6","10-15min":"Lv7-9","15-25min":"中盤","25min+":"終盤"};const fix=p=>LF[p]||p,gS=v=>v>0?"+"+v:""+v,bc=a=>a>=2?"#22c55e":a===1?"#86efac":a===0?"#94a3b8":a===-1?"#fca5a5":"#ef4444",al=a=>a>=2?"大幅有利":a===1?"やや有利":a===0?"互角":a===-1?"やや不利":"大幅不利",vc=v=>v>0?"#86efac":v<0?"#fca5a5":"#94a3b8";let role="top",cA="",cB="",idx={},champs={},ddOpen=null,_tl=[];let bA1="",bA2="",bB1="",bB2="",botChamps={adc:[],sup:[]};const CC={};function gc(n){if(CC[n])return CC[n];let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);CC[n]=`hsl(${Math.abs(h)%360},50%,42%)`;return CC[n]}function ci(n,s){return`<div class="ci" style="width:${s}px;height:${s}px;font-size:${s*.36}px;background:linear-gradient(135deg,${gc(n)},${gc(n)}cc)">${n.replace(/[^A-Za-z]/g,"").slice(0,2).toUpperCase()}</div>`}
async function init(){try{const r=await fetch("data/matchup_index.json");if(!r.ok)throw 0;idx=await r.json()}catch(e){document.getElementById("sub").textContent="❌ data/matchup_index.json が見つかりません";return}let t=0;for(const r of Object.keys(idx)){const cs=new Set();(idx[r]||[]).forEach(k=>{if(r==="bot"){const sides=k.split("_vs_");if(sides.length===2){sides.forEach(s=>s.split("-").forEach(c=>cs.add(c)))}}else{const p=k.split("_vs_");if(p.length===2){cs.add(p[0]);cs.add(p[1])}}});champs[r]=[...cs].sort();t+=idx[r].length}if(idx.bot){const adcSet=new Set(),supSet=new Set();(idx.bot||[]).forEach(k=>{const sides=k.split("_vs_");sides.forEach(s=>{const cc=s.split("-");if(cc.length===2){adcSet.add(cc[0]);adcSet.add(cc[1]);supSet.add(cc[0]);supSet.add(cc[1])}})});botChamps.all=[...new Set([...adcSet,...supSet])].sort()}document.getElementById("sub").textContent=`Riot API実データ — ${t}マッチアップ（JP+KR サーバー）`;const ar=Object.keys(idx).filter(r=>idx[r].length>0);if(ar.length>0&&!idx[role])role=ar[0];renderTabs();renderSels();renderPresets();renderOut()}
function renderTabs(){const el=document.getElementById("tabs");el.innerHTML="";for(const[r,m]of Object.entries(ROLES)){if(!idx[r])continue;const b=document.createElement("button");b.className="tab"+(r===role?" on":"");b.style.setProperty("--tbg",m.c+"22");b.style.setProperty("--tbc",m.c+"55");b.innerHTML=`<span style="font-size:14px">${m.i}</span><span class="cp" style="font-size:10px;font-weight:700;color:${r===role?m.c:"#64748b"}">${m.l}</span><span style="font-size:9px;color:#475569">${(idx[r]||[]).length}</span>`;b.onclick=()=>{role=r;cA="";cB="";bA1="";bA2="";bB1="";bB2="";closeDd();renderTabs();renderSels();renderPresets();renderOut()};el.appendChild(b)}}
function renderSels(){const area=document.getElementById("selArea");if(role==="bot"){area.innerHTML=`<div style="margin-top:12px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><div style="width:4px;height:20px;border-radius:2px;background:#3b82f6"></div><span class="cp" style="font-size:11px;font-weight:700;color:#60a5fa;letter-spacing:1px">味方 BOT</span></div><div class="srow" style="margin-top:0"><div class="sw" id="swBA1"></div><div style="font-size:11px;color:#475569;padding-bottom:10px">+</div><div class="sw" id="swBA2"></div></div></div><div class="vs">VS</div><div style="margin-bottom:4px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><div style="width:4px;height:20px;border-radius:2px;background:#ef4444"></div><span class="cp" style="font-size:11px;font-weight:700;color:#f87171;letter-spacing:1px">敵 BOT</span></div><div class="srow" style="margin-top:0"><div class="sw" id="swBB1"></div><div style="font-size:11px;color:#475569;padding-bottom:10px">+</div><div class="sw" id="swBB2"></div></div></div>`;const all=botChamps.all||champs.bot||[];const mkSel=(id,lbl,val,onChange,tag)=>{rSelBot(id,lbl,val,onChange,tag,all)};mkSel("swBA1","ADC",bA1,v=>{bA1=v;closeDd();renderSels();renderPresets();renderOut()},"BA1");mkSel("swBA2","SUP",bA2,v=>{bA2=v;closeDd();renderSels();renderPresets();renderOut()},"BA2");mkSel("swBB1","ADC",bB1,v=>{bB1=v;closeDd();renderSels();renderPresets();renderOut()},"BB1");mkSel("swBB2","SUP",bB2,v=>{bB2=v;closeDd();renderSels();renderPresets();renderOut()},"BB2")}else{area.innerHTML=`<div class="srow"><div class="sw" id="swA"></div><div class="vs">VS</div><div class="sw" id="swB"></div></div>`;rSel("swA","あなたのチャンプ",cA,v=>{cA=v;closeDd();renderSels();renderPresets();renderOut()},"A");rSel("swB","対面チャンプ",cB,v=>{cB=v;closeDd();renderSels();renderPresets();renderOut()},"B")}}function rSelBot(id,label,val,onChange,tag,pool){const w=document.getElementById(id);if(!w)return;w.innerHTML=`<label class="slbl">${label}</label><button class="sbtn ${val?"":"emp"}" id="btn${tag}">${val?ci(val,22):""}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${val||"選択..."}</span><span style="font-size:11px;color:#64748b">▼</span></button>`;document.getElementById("btn"+tag).onclick=e=>{e.stopPropagation();if(ddOpen===tag){closeDd();return}closeDd();ddOpen=tag;const dd=document.createElement("div");dd.className="dd";dd.id="dd"+tag;const inp=document.createElement("input");inp.placeholder="検索...";const list=document.createElement("div");list.className="ddl";const used=[bA1,bA2,bB1,bB2].filter(x=>x&&x!==val);function fill(q){list.innerHTML="";pool.filter(c=>!used.includes(c)&&c.toLowerCase().includes(q.toLowerCase())).forEach(c=>{const b=document.createElement("button");b.className="ddi";b.innerHTML=ci(c,20)+`<span>${c}</span>`;b.onclick=()=>{onChange(c)};list.appendChild(b)});if(!list.children.length)list.innerHTML='<div style="padding:12px;color:#64748b;text-align:center;font-size:12px">見つかりません</div>'}inp.oninput=()=>fill(inp.value);dd.appendChild(inp);dd.appendChild(list);w.appendChild(dd);fill("");setTimeout(()=>inp.focus(),50)}}function rSel(id,label,val,onChange,tag){const w=document.getElementById(id);w.innerHTML=`<label class="slbl">${label}</label><button class="sbtn ${val?"":"emp"}" id="btn${tag}">${val?ci(val,22):""}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${val||"選択..."}</span><span style="font-size:11px;color:#64748b">▼</span></button>`;document.getElementById("btn"+tag).onclick=e=>{e.stopPropagation();if(ddOpen===tag){closeDd();return}closeDd();ddOpen=tag;const dd=document.createElement("div");dd.className="dd";dd.id="dd"+tag;const inp=document.createElement("input");inp.placeholder="検索...";const list=document.createElement("div");list.className="ddl";const ot=tag==="A"?cB:cA;function fill(q){list.innerHTML="";(champs[role]||[]).filter(c=>c!==ot&&c.toLowerCase().includes(q.toLowerCase())).forEach(c=>{const b=document.createElement("button");b.className="ddi";b.innerHTML=ci(c,20)+`<span>${c}</span>`;b.onclick=()=>{onChange(c)};list.appendChild(b)});if(!list.children.length)list.innerHTML='<div style="padding:12px;color:#64748b;text-align:center;font-size:12px">見つかりません</div>'}inp.oninput=()=>fill(inp.value);dd.appendChild(inp);dd.appendChild(list);w.appendChild(dd);fill("");setTimeout(()=>inp.focus(),50)}}function closeDd(){if(ddOpen){const d=document.getElementById("dd"+ddOpen);if(d)d.remove();ddOpen=null}}document.addEventListener("click",e=>{if(ddOpen&&!e.target.closest(".sw"))closeDd()});
function renderPresets(){const el=document.getElementById("presets");el.innerHTML="";if(role==="bot"){(idx.bot||[]).slice(0,8).forEach(k=>{const sides=k.split("_vs_");if(sides.length!==2)return;const btn=document.createElement("button");btn.className="pbtn";const a=sides[0].split("-"),b=sides[1].split("-");btn.textContent=a.join("+")+` vs `+b.join("+");btn.style.fontSize="9px";btn.onclick=()=>{bA1=a[0]||"";bA2=a[1]||"";bB1=b[0]||"";bB2=b[1]||"";closeDd();renderSels();renderPresets();renderOut()};el.appendChild(btn)});return}(idx[role]||[]).slice(0,12).forEach(k=>{const p=k.split("_vs_");if(p.length!==2)return;const[a,b]=p;const btn=document.createElement("button");btn.className="pbtn"+(cA===a&&cB===b?" on":"");btn.textContent=a+" vs "+b;btn.onclick=()=>{cA=a;cB=b;closeDd();renderSels();renderPresets();renderOut()};el.appendChild(btn)})}
function genAdv(tl,a,b){return tl.map(t=>{const g=t.avg_gold_diff,adv=t.advantage,xp=t.avg_xp_diff;let tx="";if(t.phase==="0-5min"||t.phase==="5-10min"){if(adv>=2)tx=`${a}の序盤が非常に強い（平均${Math.abs(g)}Gリード）。積極的にトレードしてスノーボールを狙う。`;else if(adv===1)tx=`${a}がやや有利（${Math.abs(g)}G差）。短いトレードでリードを広げつつ、ガンクに備えてワード管理。`;else if(adv===0)tx=`互角のレーン（Gold差${Math.abs(g)}G）。無理なトレードは避け、ジャングラーの動きに合わせてチャンスを作る。`;else if(adv===-1)tx=`${b}がやや有利（${Math.abs(g)}G差）。${a}はショートトレードで凌ぎ、CSを落とさないことを優先。`;else tx=`${b}の序盤が非常に強い（平均${Math.abs(g)}Gリード）。${a}はタワー下でファームを安定させる。`}else if(t.phase==="10-15min"){if(adv>=1)tx=`Ult解禁後も${a}がリード維持（${Math.abs(g)}G差）。1stタワーとリフトヘラルドでリード拡大。`;else if(adv===0)tx=`Ult解禁で互角。最初のオールインが重要。サモナースペル管理を意識。`;else tx=`${b}がリード拡大（${Math.abs(g)}G差）。${a}は無理せずファーム。アイテムスパイクを待つ。`}else if(t.phase==="15-25min"){if(adv>=2)tx=`中盤は${a}が大きくリード（${Math.abs(g)}G差）。サイドレーンの圧力でオブジェクトを取りに行く。`;else if(adv===1)tx=`中盤やや有利。TP有利やローム圧で他レーンにも影響を与える。`;else if(adv===0)tx=`中盤は互角。チームファイトの立ち回りとオブジェクト管理が重要。`;else if(adv===-1)tx=`中盤は${b}がやや有利。${a}はグループしてTFで巻き返すか、ファームでアイテム差を縮める。`;else tx=`中盤は${b}が大幅リード（${Math.abs(g)}G差）。${a}はチームと合流して集団戦で逆転を狙う。`}else{if(adv>=2)tx=`終盤も${a}が有利を維持（${Math.abs(g)}G差）。スプリットまたは集団戦でゲームを畳む。`;else if(adv===1)tx=`終盤やや有利。1回のTFで勝敗が決まる。ポジショニングと視界管理を徹底。`;else if(adv===0){const xs=xp>200?`XPでは${a}が逆転（+${xp}）。レベル差を活かしたい。`:"完全な五分。ミクロの差が勝敗を決める。";tx=`終盤は互角。${xs}`}else if(adv===-1)tx=`終盤は${b}のスケールがやや上。${a}はキャッチやピックで少数戦の有利を作りたい。`;else tx=`終盤は${b}が大幅有利にスケール（${Math.abs(g)}G差）。${a}は中盤までに有利を作って早期決着を。`}return{phase:fix(t.phase),text:tx,advantage:adv}})}
async function renderOut(){const out=document.getElementById("out");const isBot=role==="bot";if(isBot){if(!bA1||!bA2||!bB1||!bB2){out.innerHTML=`<div style="margin-top:32px;text-align:center;color:#334155"><div style="font-size:46px;margin-bottom:8px">👥</div><p class="cp" style="font-size:13px;font-weight:600;color:#475569">ADC + SUP を4体選択してBOT 2v2を分析</p><p style="font-size:11px;color:#334155;margin-top:3px">${(idx.bot||[]).length} ペアマッチアップ</p></div>`;return}const pair1=[bA1,bA2].sort().join("-");const pair2=[bB1,bB2].sort().join("-");const sorted=[pair1,pair2].sort();const key=sorted.join("_vs_");out.innerHTML='<div style="text-align:center;padding:30px;color:#64748b;font-size:12px">読み込み中...</div>';let data=null;try{const r=await fetch(`data/matchups/bot/${key}.json`);if(r.ok)data=await r.json()}catch(e){}const dispA=bA1+" + "+bA2,dispB=bB1+" + "+bB2;let h=`<div style="margin-top:22px;animation:slideUp .3s ease">`;h+=`<div class="mh"><div style="text-align:center"><div style="display:flex;gap:4px;justify-content:center">${ci(bA1,32)}${ci(bA2,32)}</div><div class="mn" style="font-size:11px">${dispA}</div></div><div class="cp" style="font-size:20px;font-weight:700;color:#334155">VS</div><div style="text-align:center"><div style="display:flex;gap:4px;justify-content:center">${ci(bB1,32)}${ci(bB2,32)}</div><div class="mn" style="font-size:11px">${dispB}</div></div></div>`;if(!data){h+=`<div style="margin-top:16px;padding:20px;text-align:center;background:rgba(30,41,59,0.3);border-radius:10px;border:1px solid rgba(148,163,184,0.1)"><div style="font-size:28px;margin-bottom:6px">🔍</div><div class="cp" style="font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:4px">データなし</div><p style="color:#64748b;font-size:11px">このBOT 2v2の組み合わせは収集データに含まれていません。</p></div></div>`;out.innerHTML=h;return}const rev=sorted[0]!==pair1;if(rev){data={...data,overall_winrate_a:data.overall_winrate_a>0?100-data.overall_winrate_a:0,timeline:(data.timeline||[]).map(t=>({...t,avg_gold_diff:-t.a
